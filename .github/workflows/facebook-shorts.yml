name: Facebook Shorts Auto-Publisher

on:
  schedule:
    - cron: "0 6 * * *"
    - cron: "0 11 * * *"
    - cron: "0 16 * * *"
    - cron: "0 20 * * *"
  workflow_dispatch: {}

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: pip install requests gTTS

      - name: Generate and publish short
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          FB_PAGE_ACCESS_TOKEN: ${{ secrets.FB_PAGE_ACCESS_TOKEN }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
        run: python generate_facebook_short.py

      - name: Upload output as artifact (backup copy)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: facebook-short-${{ github.run_id }}
          path: /home/runner/facebook_shorts/
          retention-days: 7
